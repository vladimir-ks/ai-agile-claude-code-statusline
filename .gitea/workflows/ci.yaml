name: Module CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Validate metadata
        run: test -f CLAUDE.md && test -f README.md && test -f v2/package.json

      - name: Install and test
        run: |
          set -euo pipefail
          cd v2
          bun install --frozen-lockfile || bun install
          bun run typecheck
          bun test
          bun run build
